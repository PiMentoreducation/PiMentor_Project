<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard | PiMentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
        --accent: #7c4dff;
        --accent-glow: rgba(124, 77, 255, 0.4);
        --glass: rgba(255, 255, 255, 0.05);
        --text: #ffffff;
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    [data-theme="light"] {
        --space-bg: radial-gradient(circle at top, #f4f7f6 0%, #e8f0fe 100%);
        --text: #1a1a1a;
        --glass: rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--space-bg); color: var(--text); overflow-x: hidden; transition: background 0.5s ease; }

    /* --- STARDUST BACKGROUND --- */
    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.3; z-index: -1; animation: twinkle 100s linear infinite;
    }
    @keyframes twinkle { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

    /* --- GALACTIC NAVBAR --- */
    .navbar {
        position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
        display: flex; align-items: center; justify-content: flex-start;
        padding: 0 5%; background: rgba(13, 17, 23, 0.8);
        backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
        gap: 20px;
    }

    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: auto; }
    .logo-img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); }
    .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.8; transition: var(--transition); }
    .logout-btn-desktop { color: #ff4d4d !important; border: 1px solid #ff4d4d; padding: 8px 15px; border-radius: 20px; }

    /* --- MOBILE HAMBURGER --- */
    .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
    .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }

    /* --- SIDEBAR --- */
    .sidebar {
        position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
        background: rgba(10, 10, 15, 0.98); backdrop-filter: blur(25px);
        z-index: 2000; transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); padding: 40px 30px; border-right: 1px solid var(--accent);
    }
    .sidebar.open { left: 0; }
    .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .sidebar-links a { color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: 700; }

    /* --- THEME SWITCH --- */
    .theme-switch-wrapper { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
    .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider-round { background-color: var(--accent); }
    input:checked + .slider-round:before { transform: translateX(24px); }

    /* --- DASHBOARD CONTENT --- */
    .dashboard-container { max-width: 1100px; margin: 100px auto 40px; padding: 0 20px; }
    section { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(10px); }
    h2 { font-size: 1.3rem; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .course-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; transition: var(--transition); }
    .course-card:hover { transform: translateY(-5px); border-color: var(--accent); }

    .btn-main { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-renew { background: #f39c12; color: #000; }
    
    @media (max-width: 900px) {
        .nav-links { display: none; }
        .hamburger { display: flex; order: -1; }
        .brand { margin-right: 0; }
    }
  </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>

    <div class="brand" onclick="window.location.href='index.html'">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">All Courses</a>
        <a href="#" id="logoutBtnDesktop" class="logout-btn-desktop">Logout</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: #fff;">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:#fff; font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    
    <div class="theme-switch-wrapper">
        <span style="font-weight:700; color:#fff;">Dark Theme</span>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider-round"></span>
        </label>
    </div>

    <nav class="sidebar-links">
        <a href="index.html">Home</a>
        <a href="courses.html">All Courses</a>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
            <a href="#" id="logoutBtnMobile" style="color:#ff4d4d;">Logout</a>
        </div>
    </nav>
</aside>

<div class="dashboard-container">
    <h1 style="margin-bottom: 30px;">Welcome, <span id="welcomeName" style="color: var(--accent);">Student</span> 🌌</h1>

    <section class="profile-card">
        <h2>Your Galactic Profile</h2>
        <div style="line-height: 1.8;">
            <p><strong>Name:</strong> <span id="profileName"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Current Class:</strong> <span id="studentClass">Loading...</span></p>
        </div>
    </section>

    <section>
        <h2>Your Active Courses</h2>
        <div id="courseList" class="course-grid">
            <p style="opacity: 0.6;">Scanning for enrolled courses...</p>
        </div>
    </section>

    <section>
        <h2>📬 Mentor Support</h2>
        <div id="dashboardDoubtsContainer">
            <p style="opacity: 0.6;">Fetching your doubts...</p>
        </div>
    </section>
</div>

<script>
    const BASE_URL = "https://pimentor-project.onrender.com";
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    // SideBar Logic
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    hamburger.onclick = () => sidebar.classList.add('open');
    closeSidebar.onclick = () => sidebar.classList.remove('open');

    // Theme Logic
    const themeToggle = document.getElementById('themeToggle');
    const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        themeToggle.checked = (theme === 'dark');
        localStorage.setItem('pimentor-theme', theme);
    };
    applyTheme(localStorage.getItem('pimentor-theme') || 'dark');
    themeToggle.onchange = () => applyTheme(themeToggle.checked ? 'dark' : 'light');

    // Auth & Logout
    const logout = () => { localStorage.clear(); window.location.href = "login.html"; };
    document.getElementById("logoutBtnDesktop").onclick = logout;
    document.getElementById("logoutBtnMobile").onclick = logout;

    document.addEventListener("DOMContentLoaded", () => {
        if (!token) { window.location.href = "login.html"; return; }
        document.getElementById("welcomeName").innerText = user.name || "Explorer";
        document.getElementById("profileName").innerText = user.name || "N/A";
        document.getElementById("profileEmail").innerText = user.email || "N/A";
        document.getElementById("studentClass").innerText = user.studentClass || "Not Assigned";
        loadStudentCourses();
        loadDashboardDoubts();
    });

    async function loadStudentCourses() {
        const container = document.getElementById("courseList");
        try {
            const pRes = await fetch(`${BASE_URL}/api/purchase/my-courses`, { headers: { "Authorization": "Bearer " + token } });
            const purchases = await pRes.json();
            const cRes = await fetch(`${BASE_URL}/api/admin/all-courses`, { headers: { "Authorization": "Bearer " + token } });
            const allMetadata = await cRes.json();
            const now = new Date();

            if (purchases.length === 0) {
                container.innerHTML = "<p>No active courses found. Start your journey in the Courses page!</p>";
                return;
            }

            container.innerHTML = purchases.map(p => {
                const expiry = new Date(p.expiryDate);
                const isExpired = now > expiry;
                const meta = allMetadata.find(m => m.courseId === p.courseId) || {};
                return `
                    <div class="course-card">
                        <h3>${p.title}</h3>
                        <p style="font-size:0.8rem; margin:10px 0; opacity:0.7;">Expires: ${expiry.toLocaleDateString()}</p>
                        ${isExpired ? 
                          `<button class="btn-main btn-renew" onclick="window.location.href='courses.html?renew=${p.courseId}'">Renew Now</button>` : 
                          `<button class="btn-main" onclick="window.location.href='course-structure.html?id=${p.courseId}'">Continue Learning</button>`
                        }
                    </div>`;
            }).join('');
        } catch (e) { container.innerHTML = "<p>Failed to load courses.</p>"; }
    }

    async function loadDashboardDoubts() {
        const container = document.getElementById("dashboardDoubtsContainer");
        try {
            const res = await fetch(`${BASE_URL}/api/purchase/my-dashboard-doubts`, { headers: { "Authorization": "Bearer " + token } });
            const doubts = await res.json();
            if(!doubts.length) { container.innerHTML = "<p>No mentor replies yet.</p>"; return; }
            container.innerHTML = doubts.map(d => `
                <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px;">
                    <strong>Q: ${d.question}</strong>
                    <p style="margin-top:5px; color:var(--accent);">${d.answer || "⏳ Reviewing..."}</p>
                </div>`).join('');
        } catch (e) { container.innerHTML = "<p>Doubt inbox unavailable.</p>"; }
    }
</script>
</body>
</html>
