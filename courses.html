<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy Courses | PiMentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
        --accent: #7c4dff;
        --accent-glow: rgba(124, 77, 255, 0.4);
        --glass: rgba(255, 255, 255, 0.05);
        --text: #ffffff;
        --card-border: rgba(255, 255, 255, 0.1);
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        --danger: #ff4d4d;
        --success: #2ecc71;
    }

    [data-theme="light"] {
        --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
        --text: #1b4332;
        --accent: #2d6a4f;
        --glass: rgba(255, 255, 255, 0.85);
        --card-border: rgba(45, 106, 79, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s ease; }
    body { background: var(--space-bg); color: var(--text); overflow-x: hidden; min-height: 100vh; background-attachment: fixed; }

    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.2; z-index: -1;
    }

    /* --- NAVBAR --- */
    .navbar {
        position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
        display: flex; align-items: center; padding: 0 5%;
        background: var(--glass); backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--card-border);
    }

    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: auto; text-decoration: none; }
    .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
    .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.9; }

    .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
    .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }

    /* --- SEARCH & FILTER SECTION --- */
    .filter-section {
        max-width: 1200px; margin: 100px auto 0; padding: 0 20px;
        display: flex; gap: 15px; flex-wrap: wrap;
    }

    .search-box {
        flex: 2; min-width: 250px; position: relative;
    }

    .search-box input {
        width: 100%; padding: 15px 20px; border-radius: 15px; border: 1px solid var(--card-border);
        background: var(--glass); color: var(--text); outline: none; transition: 0.3s;
    }

    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

    .class-filter {
        flex: 1; min-width: 150px;
    }

    .class-filter select {
        width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--card-border);
        background: var(--glass); color: var(--text); outline: none; cursor: pointer;
    }

    /* --- SIDEBAR --- */
    .sidebar {
        position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
        background: var(--glass); backdrop-filter: blur(25px);
        z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
    }
    .sidebar.open { left: 0; }
    .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }

    @media (max-width: 900px) {
        .nav-links { display: none; }
        .hamburger { display: flex; order: -1; margin-right: auto; }
        .brand { margin-left: auto; margin-right: 0; }
        .filter-section { margin-top: 90px; }
    }

    /* --- COURSE GRID --- */
    .course-container { 
        max-width: 1200px; margin: 20px auto 40px; padding: 0 20px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;
    }
    
    .course-card { 
        background: var(--glass); border: 1px solid var(--card-border); border-radius: 28px; 
        padding: 25px; backdrop-filter: blur(15px); transition: var(--transition);
        display: flex; flex-direction: column; position: relative;
    }
    
    .course-card:hover { transform: translateY(-12px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

    .course-thumb {
        width: 100%; height: 180px; object-fit: cover; border-radius: 20px;
        margin-bottom: 15px; border: 1px solid var(--card-border);
    }
    
    .course-card h3 { font-size: 1.4rem; margin-bottom: 8px; font-weight: 800; }
    .course-card .description { font-size: 0.9rem; opacity: 0.7; margin-bottom: 20px; flex-grow: 1; line-height: 1.5; }
    
    /* PRICING */
    .price-wrapper { 
        margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.02);
        border-radius: 18px; border: 1px solid rgba(255,255,255,0.05);
    }
    
    .old-price-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; opacity: 0.5; display: block; }
    .old-price { text-decoration: line-through; color: var(--danger); font-size: 1.3rem; font-weight: 700; margin-right: 10px; }
    .new-price { font-size: 2.4rem; font-weight: 800; color: var(--success); text-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
    
    .discount-badge { 
        background: var(--accent); color: white; font-weight: 900; font-size: 0.85rem; 
        padding: 5px 12px; border-radius: 50px; box-shadow: 0 5px 15px var(--accent-glow);
        animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
        0% { transform: scale(1); box-shadow: 0 5px 10px var(--accent-glow); }
        50% { transform: scale(1.05); box-shadow: 0 5px 20px var(--accent); }
        100% { transform: scale(1); box-shadow: 0 5px 10px var(--accent-glow); }
    }

    .btn-action { width: 100%; padding: 14px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 1rem; }
    .btn-buy { background: var(--accent); color: white; box-shadow: 0 8px 20px var(--accent-glow); }
    .btn-details { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--card-border); }
    
    .btn-free { 
        background: linear-gradient(90deg, #2ecc71, #27ae60); color: white; 
        box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); margin-top: 15px;
    }
  </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <a href="/index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="community.html">Community</a>
        <a href="support.html">Contact Us</a>
        <a href="pishot_hub.html">PiShot</a>
        <button id="themeToggleBtn" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:1.2rem;">🌙</button>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:inherit; font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    <nav class="sidebar-links">
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="pishot_hub.html">PiShot</a>
        <a href="community.html">Community</a>
        <a href="support.html">Support</a>
    </nav>
</aside>

<div class="filter-section">
    <div class="search-box">
        <input type="text" id="courseSearch" placeholder="🔍 Search courses, topics, or descriptions...">
    </div>
    <div class="class-filter">
        <select id="classDropdown">
            <option value="all">All Classes</option>
            </select>
    </div>
</div>

<div class="course-container" id="courseContainer">
    <p id="statusMessage" style="grid-column: 1/-1; text-align: center; opacity: 0.6;">Scanning the learning galaxy...</p>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let globalCourses = [];
let globalPurchases = [];

document.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  const userData = JSON.parse(localStorage.getItem("user") || "{}");
  const currentUserId = userData.id || userData._id;

  // Sidebar Logic
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar'), closeSidebar = document.getElementById('closeSidebar');
  hamburger.onclick = () => sidebar.classList.add('open');
  closeSidebar.onclick = () => sidebar.classList.remove('open');

  // Theme Logic
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const applyTheme = (theme) => {
    document.documentElement.setAttribute("data-theme", theme);
    if(themeToggleBtn) themeToggleBtn.innerText = (theme === 'dark' ? '☀️' : '🌙');
    localStorage.setItem('pimentor-theme', theme);
  };
  applyTheme(localStorage.getItem('pimentor-theme') || 'dark');
  if(themeToggleBtn) themeToggleBtn.onclick = () => applyTheme(document.documentElement.getAttribute("data-theme") === 'dark' ? 'light' : 'dark');

  if (!token || !currentUserId) { window.location.href = "login.html"; return; }

  try {
    const [courseRes, purchaseRes] = await Promise.all([
      fetch("https://pimentor-project.onrender.com/api/purchase/all-courses", { headers: { "Authorization": "Bearer " + token } }),
      fetch("https://pimentor-project.onrender.com/api/purchase/my-courses", { headers: { "Authorization": "Bearer " + token } })
    ]);

    globalCourses = await courseRes.json();
    globalPurchases = await purchaseRes.json();
    
    populateClassDropdown(globalCourses);
    renderCourses(globalCourses);

    // Event Listeners for Search and Filter
    document.getElementById('courseSearch').addEventListener('input', filterCourses);
    document.getElementById('classDropdown').addEventListener('change', filterCourses);

  } catch (err) { 
      document.getElementById("courseContainer").innerHTML = "<p>Database Error. Please refresh.</p>"; 
  }
});

function populateClassDropdown(courses) {
    const dropdown = document.getElementById('classDropdown');
    const classes = [...new Set(courses.map(c => c.className || 'General'))];
    classes.forEach(cls => {
        const opt = document.createElement('option');
        opt.value = cls;
        opt.innerText = cls;
        dropdown.appendChild(opt);
    });
}

function filterCourses() {
    const searchTerm = document.getElementById('courseSearch').value.toLowerCase();
    const selectedClass = document.getElementById('classDropdown').value;

    const filtered = globalCourses.filter(course => {
        const matchesSearch = 
            course.title.toLowerCase().includes(searchTerm) || 
            (course.description && course.description.toLowerCase().includes(searchTerm)) ||
            (course.className && course.className.toLowerCase().includes(searchTerm));
        
        const matchesClass = selectedClass === 'all' || course.className === selectedClass;

        return matchesSearch && matchesClass;
    });

    renderCourses(filtered);
}

function renderCourses(courses) {
    const container = document.getElementById("courseContainer");
    const currentUserId = JSON.parse(localStorage.getItem("user") || "{}").id;
    const nowMs = Date.now();
    container.innerHTML = "";

    if (courses.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.6; padding: 50px;">No courses found matching your criteria.</p>';
        return;
    }

    courses.forEach(course => {
      const myPurchases = globalPurchases.filter(p => 
          String(p.courseId).trim() === String(course.courseId).trim()
      );
      
      let isStillActive = false;
      let hasPreviousPurchase = myPurchases.length > 0;
      if (hasPreviousPurchase) {
          myPurchases.forEach(p => {
              if (p.expiryDate) {
                  const expMs = new Date(p.expiryDate).getTime();
                  if (!isNaN(expMs) && expMs > nowMs) isStillActive = true; 
              }
          });
      }

      const originalPrice = Number(course.oldPrice || course.price + 500);
      const discount = Math.round(((originalPrice - course.price) / originalPrice) * 100);

      const div = document.createElement("div");
      div.className = "course-card";
      let buttonText = "Buy Now", isDisabled = false, btnBg = "var(--accent)";

      if (isStillActive) {
          buttonText = "Purchased"; isDisabled = true; btnBg = "#6c757d"; 
      } else if (hasPreviousPurchase) {
          buttonText = "Renew Now"; isDisabled = false; btnBg = "#f39c12"; 
      }

      const isFreeEligible = course.free === "yes" && !isStillActive;

      div.innerHTML = `
        ${course.thumbnail ? `<img src="${course.thumbnail}" class="course-thumb" alt="${course.title}">` : ''}
        <span style="font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;">
          ${course.className || 'General'}
        </span>
        <h3>${course.title}</h3>
        <p class="description">${course.description || ''}</p>
        
        <div class="price-wrapper">
          <span class="old-price-label">Original Price</span>
          <span class="old-price">₹${originalPrice}</span>
          <div class="new-price-container">
              <span class="new-price">₹${course.price}</span>
              ${discount > 0 ? `<span class="discount-badge">${discount}% OFF</span>` : ''}
          </div>
        </div>

        <button class="btn-action btn-details" onclick="window.location.href='course-desc.html?id=${course.courseId}'">
          Course Details
        </button>
        <button class="btn-action btn-buy" ${isDisabled ? "disabled" : ""} 
          id="btn-${course.courseId}" 
          style="background: ${btnBg}; cursor: ${isDisabled ? 'not-allowed' : 'pointer'};">
          ${buttonText}
        </button>
        ${isFreeEligible ? `
          <button class="btn-action btn-free" onclick='getFreeCourse(${JSON.stringify(course)})'>
            GET IT FOR FREE TODAY
          </button>
        ` : ''}
      `;

      if (!isDisabled) div.querySelector(".btn-buy").onclick = () => buyCourse(course);
      container.appendChild(div);
    });
}

async function getFreeCourse(course) {
  const token = localStorage.getItem("token");
  if (!confirm(`Are you sure you want to enroll in "${course.title}" for free?`)) return;

  try {
    const res = await fetch("https://pimentor-project.onrender.com/api/payment/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({ isFreePurchase: true, course: { courseId: course.courseId } })
    });

    if (res.ok) {
      alert("Enrolled Successfully!");
      window.location.href = "dashboard.html";
    } else {
      const result = await res.json();
      throw new Error(result.message || "Failed to enroll.");
    }
  } catch (error) { alert("Error: " + error.message); }
}

async function buyCourse(course) {
  const isWebView = /WebView|wv|pimentor-app/i.test(navigator.userAgent);
  if (isWebView) {
    alert("Please log in to our website via a standard browser to manage enrollments.");
    return;
  }

  const token = localStorage.getItem("token");
  try {
    const res = await fetch("https://pimentor-project.onrender.com/api/payment/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({ courseId: course.courseId })
    });
    
    const data = await res.json();
    const order = data.order; 

    const options = {
      key: "rzp_live_ST3WplEy2H1SuY",
      amount: order.amount, 
      currency: "INR",
      name: "PiMentor",
      description: course.title,
      order_id: order.id,
      handler: async function (response) {
        const saveRes = await fetch("https://pimentor-project.onrender.com/api/payment/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({
            razorpay_order_id: response.razorpay_order_id,
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_signature: response.razorpay_signature,
            course: { courseId: course.courseId }
          })
        });
        if (saveRes.ok) { 
            alert("Payment Successful!"); 
            window.location.href = "dashboard.html"; 
        }
      },
      theme: { color: "#7c4dff" }
    };
    const rzp = new Razorpay(options);
    rzp.open();
  } catch (error) { alert("Purchase failed."); }
}
</script>
</body>
</html>
