<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Player | PiMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4d4d;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--space-bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; transition: 0.5s; min-height: 100vh; }

        /* --- STARDUST BACKGROUND --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        /* --- PLAYER HEADER --- */
        .player-header {
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle {
            background: none; border: 1.5px solid var(--accent); color: var(--accent);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        /* --- VIDEO BOX & SHIELD --- */
        .player-layout { display: grid; grid-template-columns: 1fr 350px; gap: 25px; padding: 90px 20px 20px; max-width: 1400px; margin: 0 auto; }
        .video-main { width: 100%; }
        .video-box { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            background: #000; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid var(--card-border);
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .yt-bottom-shield {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 65px;
            background: var(--glass); backdrop-filter: blur(12px);
            z-index: 10; pointer-events: none; opacity: 0;
            transition: opacity 0.4s ease; border-top: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
        }
        .yt-bottom-shield::after {
            content: "PiMentor Secure Stream"; font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.4;
        }
        .video-box.overlay-active .yt-bottom-shield { opacity: 1; }

        /* --- SIDEBAR & BUTTONS --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card { background: var(--glass); border-radius: 20px; border: 1px solid var(--card-border); padding: 20px; backdrop-filter: blur(10px); }
        .lecture-list-container { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .lecture-item { padding: 14px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; margin-bottom: 8px; background: rgba(255,255,255,0.02); }
        .lecture-item:hover { background: var(--accent); color: white; transform: translateX(5px); }
        .active-lecture { background: var(--accent) !important; color: white !important; font-weight: 700; }
        .btn-res { display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; text-align: center; font-weight: 800; cursor: pointer; border: none; font-size: 0.85rem; }
        .btn-pdf { background: rgba(255, 77, 77, 0.15); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }
        .btn-mcq { background: rgba(40, 167, 69, 0.15); color: #2ecc71; border: 1px solid rgba(40, 167, 69, 0.3); }
        #doubtText { width: 100%; height: 80px; margin-top: 15px; border-radius: 12px; border: 1px solid var(--card-border); padding: 12px; background: rgba(255,255,255,0.05); color: var(--text); resize: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { width: 90%; height: 85%; background: white; border-radius: 20px; overflow: hidden; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 35px; color: white; cursor: pointer; z-index: 2002; background: var(--danger); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        @media (max-width: 900px) { .player-layout { grid-template-columns: 1fr; padding-top: 80px; } .logo-text { display: none; } }
    </style>
</head>
<body>

<header class="player-header">
    <a href="/dashboard.html" class="brand">
        <img src="/images/OUR_LOGO.png" alt="PiMentor Logo" class="logo-img">
        <div class="logo-text">PiMentor</div>
    </a>
    <div style="display: flex; gap: 15px; align-items: center;">
        <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙</button>
        <a href="#" id="backBtn" style="text-decoration: none; color: var(--accent); font-weight: 800; border: 1.5px solid var(--accent); padding: 6px 15px; border-radius: 20px; font-size: 0.85rem;">BACK</a>
    </div>
</header>

<div class="player-layout">
    <div class="video-main">
        <div class="video-box">
            <div id="mainIframe"></div>
            <div class="yt-bottom-shield"></div>
        </div>
        <div style="background: var(--glass); padding: 25px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--card-border);">
            <h1 id="lectureTitle" style="margin: 0 0 10px; font-size: 1.6rem;">Loading...</h1>
            <p id="topicDisplay" style="color: var(--accent); font-weight: 800; font-size: 0.9rem;"></p>
            <p id="chapterNameDisplay" style="opacity: 0.6; font-size: 0.8rem; margin-top: 8px;"></p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-card"><h3>Resources</h3><div id="res-box"></div></div>
        <div class="sidebar-card"><h3>Curriculum</h3><div id="lectureList" class="lecture-list-container"></div></div>
        <div class="sidebar-card">
            <h3>Ask Doubts</h3>
            <textarea id="doubtText" placeholder="Ask your mentor..."></textarea>
            <button onclick="submitDoubt()" style="width: 100%; margin-top: 12px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 800;">SEND DOUBT</button>
            <p id="doubtStatus" style="font-size: 0.75rem; margin-top: 8px; color: #2ecc71; text-align: center; font-weight: bold;"></p>
        </div>
    </div>
</div>

<div id="resourceModal" class="modal-overlay"><span class="close-modal" onclick="closeModal()">&times;</span><div class="modal-content"><iframe id="resourceIframe" style="width: 100%; height: 100%; border: none;"></iframe></div></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const chapter = urlParams.get('chapter');
    const token = localStorage.getItem("token");
    const BASE_URL = "https://pimentor-project.onrender.com";
    let activeLectureId = null;
    let ytPlayer;

    // 1. THEME LOGIC
    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        const btn = document.getElementById("themeBtn");
        if(btn) btn.innerText = theme === "dark" ? "☀️" : "🌙";
        localStorage.setItem("pimentor-theme", theme);
    }
    applyTheme(localStorage.getItem("pimentor-theme") || "dark");
    function toggleTheme() { applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }

    // 2. YOUTUBE API ENTRY POINT
    function onYouTubeIframeAPIReady() {
        console.log("YouTube API Ready");
        initPlayer();
    }

    async function initPlayer() {
        if (!courseId || !chapter) { window.location.href = "dashboard.html"; return; }
        document.getElementById("backBtn").href = `course-structure.html?id=${courseId}`;
        document.getElementById("chapterNameDisplay").innerText = "CHAPTER: " + chapter;

        try {
            const res = await fetch(`${BASE_URL}/api/purchase/course-content/${courseId}/${encodeURIComponent(chapter)}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const lectures = await res.json();
            const list = document.getElementById("lectureList");

            if (lectures.length > 0) {
                list.innerHTML = lectures.map((l, index) => `
                    <div class="lecture-item" id="lec-${l._id}" onclick='prepareVideo(${JSON.stringify(l).replace(/'/g, "&apos;")})'>
                        <span>${index + 1}. ${l.title}</span>
                    </div>
                `).join('');
                prepareVideo(lectures[0]);
            }
        } catch (err) { console.error("Init Error:", err); }
    }

    function prepareVideo(lec) {
        activeLectureId = lec._id;
        document.querySelectorAll('.lecture-item').forEach(el => el.classList.remove('active-lecture'));
        const activeItem = document.getElementById(`lec-${lec._id}`);
        if(activeItem) activeItem.classList.add('active-lecture');

        document.getElementById("lectureTitle").innerText = lec.title;
        document.getElementById("topicDisplay").innerText = "TOPIC: " + (lec.topicName || "General");

        const videoId = extractVideoID(lec.videoUrl);

        if (!ytPlayer) {
            ytPlayer = new YT.Player('mainIframe', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: { 'modestbranding': 1, 'rel': 0, 'autoplay': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        } else {
            ytPlayer.loadVideoById(videoId);
        }

        // Resources
        const resBox = document.getElementById("res-box");
        resBox.innerHTML = "";
        if(lec.pdfNotes) resBox.innerHTML += `<button class="btn-res btn-pdf" onclick="openResourceModal('${lec.pdfNotes}')">📄 View PDF Notes</button>`;
        if(lec.practiceMcq) resBox.innerHTML += `<button class="btn-res btn-mcq" onclick="openResourceModal('${lec.practiceMcq}')">📝 Take Quiz</button>`;
    }

    function onPlayerStateChange(event) {
        const videoBox = document.querySelector('.video-box');
        // Shield logic: Show on Pause, Buffer, or Cued
        if ([YT.PlayerState.PAUSED, YT.PlayerState.BUFFERING, YT.PlayerState.CUED].includes(event.data)) {
            videoBox.classList.add('overlay-active');
        } else {
            videoBox.classList.remove('overlay-active');
        }
    }

    function extractVideoID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function openResourceModal(url) {
        document.getElementById("resourceIframe").src = url;
        document.getElementById("resourceModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("resourceModal").style.display = "none";
        document.getElementById("resourceIframe").src = "";
    }

    async function submitDoubt() {
        const question = document.getElementById("doubtText").value;
        const status = document.getElementById("doubtStatus");
        if(!question.trim()) return alert("Type your question.");
        try {
            const res = await fetch(`${BASE_URL}/api/purchase/ask-doubt`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ lectureId: activeLectureId, question: question })
            });
            if(res.ok) {
                document.getElementById("doubtText").value = "";
                status.innerText = "Doubt sent! 🚀";
                setTimeout(() => status.innerText = "", 3000);
            }
        } catch (err) { console.error(err); }
    }
</script>
</body>
</html>
